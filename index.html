<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalsi App - Prima Media</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        #app-container { background: white; width: 100%; max-width: 1000px; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .flex-container { display: flex; gap: 30px; margin-top: 20px; }
        #box-brano { flex: 1; border-right: 2px solid #eee; padding-right: 20px; font-size: 18px; line-height: 1.6; color: #444; white-space: pre-wrap; }
        #box-quiz { flex: 1; }
        h1 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #1557b0; }
        .opzione-item { background: #f8f9fa; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #ddd; cursor: pointer; }
        .opzione-item:hover { background: #e8f0fe; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="schermata-lettura">
        <h1>Prova di Italiano: Lettura del Brano</h1>
        <div id="testo-pieno" style="margin: 25px 0; font-size: 19px; line-height: 1.8;">Caricamento testo...</div>
        <button onclick="iniziaQuiz()">HO LETTO, VAI ALLE DOMANDE</button>
    </div>

    <div id="schermata-quiz" class="hidden">
        <h1>Simulazione Invalsi</h1>
        <div class="flex-container">
            <div id="box-brano"></div>
            <div id="box-quiz">
                <h2 id="numero-domanda" style="color: #555;"></h2>
                <p id="testo-domanda" style="font-size: 18px; font-weight: 500;"></p>
                <div id="lista-opzioni"></div>
                <div id="controlli" style="margin-top: 30px;"></div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
